name: Enterprise Data Quality Validator Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/data-quality-validator

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -q

      - name: Generate validation input file
        run: |
          echo "id,name,age,email" > validation_input.csv
          echo "1,Alice,30,alice@example.com" >> validation_input.csv

      - name: Execute data validation
        run: python main.py validation_input.csv

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Authenticate to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Push Docker image to GHCR
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            validation_input.csv

  deploy-dev:
    needs: build-test-package
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig for dev
        run: |
          echo "${{ secrets.KUBECONFIG_DEV }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Apply dev config and deployment
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed "s|ghcr.io/YOUR_ORG/data-quality-validator:latest|$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml > k8s/deployment.dev.yaml
          kubectl apply -f k8s/config-dev.yaml
          kubectl apply -f k8s/deployment.dev.yaml
          kubectl apply -f k8s/service.yaml

  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig for qa
        run: |
          echo "${{ secrets.KUBECONFIG_QA }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Apply qa config and deployment
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed "s|ghcr.io/YOUR_ORG/data-quality-validator:latest|$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml > k8s/deployment.qa.yaml
          kubectl apply -f k8s/config-qa.yaml
          kubectl apply -f k8s/deployment.qa.yaml
          kubectl apply -f k8s/service.yaml

  deploy-prod:
    needs: deploy-qa
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://your-prod-dashboard-url
    # Configure manual approval in GitHub Environments UI for 'prod'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig for prod
        run: |
          echo "${{ secrets.KUBECONFIG_PROD }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      - name: Apply prod config and deployment
        run: |
          IMAGE_TAG=${{ github.sha }}
          sed "s|ghcr.io/YOUR_ORG/data-quality-validator:latest|$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml > k8s/deployment.prod.yaml
          kubectl apply -f k8s/config-prod.yaml
          kubectl apply -f k8s/deployment.prod.yaml
          kubectl apply -f k8s/service.yaml
